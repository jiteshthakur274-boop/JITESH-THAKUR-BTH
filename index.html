<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jitesh Thakur | Future IAS Officer</title>
    <style>
        /* ===== FUTURISTIC CSS VARIABLES ===== */
        :root {
            --neon-cyan: #00f7ff;
            --neon-magenta: #ff00ff;
            --neon-gold: #ffd700;
            --deep-space: #0a0a1a;
            --space-dark: #12122a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glow-cyan: 0 0 20px rgba(0, 247, 255, 0.5);
            --glow-magenta: 0 0 20px rgba(255, 0, 255, 0.5);
        }

        /* ===== RESET & BASE STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            background: var(--deep-space);
            color: #ffffff;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ===== SCIFI BACKGROUND ===== */
        .scifi-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                linear-gradient(to bottom, rgba(10, 10, 26, 0.9), rgba(10, 10, 26, 0.7)),
                url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=1920') center/cover no-repeat;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #ffffff, transparent),
                radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 160px 120px, #ffffff, transparent);
            background-size: 200px 200px;
            animation: twinkle 4s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* ===== HEADER & NAV ===== */
        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(10, 10, 26, 0.95), transparent);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            animation: glow-text 2s ease-in-out infinite alternate;
        }

        @keyframes glow-text {
            from { filter: drop-shadow(0 0 5px var(--neon-cyan)); }
            to { filter: drop-shadow(0 0 15px var(--neon-magenta)); }
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            transition: all 0.3s ease;
        }

        nav a::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            transition: width 0.3s ease;
        }

        nav a:hover::before {
            width: 100%;
        }

        nav a:hover {
            color: var(--neon-cyan);
        }

        /* ===== HERO SECTION ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 5%;
            position: relative;
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            max-width: 1200px;
            align-items: center;
        }

        .hero-text h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--neon-cyan), #ffffff, var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 3s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .hero-text h2 {
            font-size: 1.5rem;
            color: var(--neon-cyan);
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        .hero-text p {
            font-size: 1.1rem;
            color: #cccccc;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .tagline {
            display: inline-block;
            padding: 10px 25px;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            animation: border-glow 2s ease-in-out infinite;
        }

        @keyframes border-glow {
            0%, 100% { box-shadow: var(--glow-cyan); }
            50% { box-shadow: var(--glow-magenta); }
        }

        /* ===== CIRCULAR PROFILE IMAGE ===== */
        .profile-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-frame {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-frame::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta), var(--neon-cyan)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            animation: rotate-border 4s linear infinite;
        }

        @keyframes rotate-border {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .profile-frame::after {
            content: '';
            position: absolute;
            width: calc(100% + 20px);
            height: calc(100% + 20px);
            border-radius: 50%;
            background: linear-gradient(45deg, var(--neon-magenta), var(--neon-cyan));
            z-index: -1;
            filter: blur(20px);
            opacity: 0.5;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }

        .profile-image {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(0, 247, 255, 0.3);
            /* Using placeholder image - replace with actual photo */
            background: linear-gradient(135deg, var(--space-dark), var(--deep-space));
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, rgba(0, 247, 255, 0.1), rgba(255, 0, 255, 0.1));
            border: 2px solid rgba(0, 247, 255, 0.3);
        }

        .profile-placeholder-icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .profile-placeholder-text {
            font-size: 0.9rem;
            color: var(--neon-cyan);
            text-align: center;
            padding: 0 20px;
        }

        /* ===== SECTIONS COMMON STYLES ===== */
        section {
            padding: 80px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .section-title::before {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-magenta), var(--neon-cyan));
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--glass-bg);
            border: 1px solid rgba(0, 247, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 247, 255, 0.1), rgba(255, 0, 255, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-cyan);
            box-shadow: var(--glow-cyan);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .card h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--neon-cyan);
        }

        .card p {
            color: #cccccc;
            line-height: 1.7;
        }

        /* ===== HOBBIES SECTION ===== */
        .hobbies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        /* ===== INTERESTS SECTION ===== */
        .interests-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .interest-card {
            background: var(--glass-bg);
            border: 1px solid rgba(255, 0, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .interest-card:hover {
            border-color: var(--neon-magenta);
            box-shadow: var(--glow-magenta);
            transform: scale(1.02);
        }

        .interest-card h3 {
            color: var(--neon-magenta);
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        /* ===== ACHIEVEMENTS SECTION ===== */
        .achievements-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .achievement-item {
            background: var(--glass-bg);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            padding: 25px 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            transition: all 0.3s ease;
        }

        .achievement-item:hover {
            border-color: var(--neon-gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            transform: translateX(10px);
        }

        .achievement-icon {
            font-size: 2.5rem;
            min-width: 60px;
        }

        .achievement-content h3 {
            color: var(--neon-gold);
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .achievement-content p {
            color: #cccccc;
        }

        /* ===== GOAL SECTION ===== */
        .goal-container {
            text-align: center;
        }

        .goal-card {
            background: linear-gradient(135deg, rgba(0, 247, 255, 0.1), rgba(255, 0, 255, 0.1));
            border: 2px solid var(--neon-cyan);
            border-radius: 20px;
            padding: 50px;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .goal-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--neon-cyan), transparent, var(--neon-magenta), transparent);
            animation: rotate-bg 4s linear infinite;
            opacity: 0.1;
        }

        @keyframes rotate-bg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .goal-content {
            position: relative;
            z-index: 1;
        }

        .goal-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .goal-card h3 {
            font-size: 2rem;
            color: var(--neon-cyan);
            margin-bottom: 20px;
        }

        .goal-card p {
            font-size: 1.2rem;
            color: #cccccc;
            line-height: 1.8;
        }

        .ias-badge {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--deep-space);
            animation: badge-pulse 2s ease-in-out infinite;
        }

        @keyframes badge-pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 247, 255, 0.5); }
            50% { box-shadow: 0 0 40px rgba(255, 0, 255, 0.5); }
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 40px 5%;
            background: rgba(10, 10, 26, 0.9);
            border-top:
